<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Classification Complete</title>
</head>
<body style='margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f7fa;'>
    <table role='presentation' style='width: 100%; border-collapse: collapse;'>
        <tr>
            <td align='center' style='padding: 40px 0;'>
                <table role='presentation' style='width: 600px; max-width: 100%; border-collapse: collapse; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);'>
                    <!-- Header -->
                    <tr>
                        <td style='background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); padding: 40px 30px; text-align: center; border-radius: 12px 12px 0 0;'>
                            <h1 style='margin: 0; color: #ffffff; font-size: 32px; font-weight: 700; letter-spacing: -0.5px;'>
                                🎯 Classification Complete!
                            </h1>
                        </td>
                    </tr>
                    
                    <!-- Main content -->
                    <tr>
                        <td style='padding: 40px 30px;'>
                            <p style='margin: 0 0 20px 0; color: #4a5568; font-size: 16px; line-height: 1.6;'>
                                Your email classification job has finished processing.
                            </p>
                            
                            <!-- Stats Box -->
                            <div style='background-color: #f7fafc; border-radius: 8px; padding: 24px; margin-bottom: 30px; border-left: 4px solid #4299e1;'>
                                <h3 style='margin: 0 0 16px 0; color: #2d3748; font-size: 18px; font-weight: 600;'>
                                    📊 Classification Results
                                </h3>
                                <table style='width: 100%; border-collapse: collapse;'>
                                    <tr>
                                        <td style='padding: 8px 0; color: #4a5568; font-size: 15px;'>Total Processed:</td>
                                        <td style='padding: 8px 0; color: #2d3748; font-size: 15px; font-weight: 600; text-align: right;'>{{TotalProcessed}}</td>
                                    </tr>
                                    <tr>
                                        <td style='padding: 8px 0; color: #4a5568; font-size: 15px;'>Financial Emails:</td>
                                        <td style='padding: 8px 0; color: #48bb78; font-size: 15px; font-weight: 600; text-align: right;'>{{FinancialCount}}</td>
                                    </tr>
                                    <tr>
                                        <td style='padding: 8px 0; color: #4a5568; font-size: 15px;'>Non-Financial:</td>
                                        <td style='padding: 8px 0; color: #718096; font-size: 15px; font-weight: 600; text-align: right;'>{{NonFinancialCount}}</td>
                                    </tr>
                                </table>
                            </div>
                            
                            <!-- CTA Button -->
                            <table role='presentation' style='width: 100%; border-collapse: collapse;'>
                                <tr>
                                    <td align='center' style='padding: 10px 0;'>
                                        <a href='http://localhost:5173/emails' style='display: inline-block; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color: #ffffff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 16px; box-shadow: 0 4px 6px rgba(66, 153, 225, 0.3);'>
                                            Review Classifications
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style='background-color: #f7fafc; padding: 30px; text-align: center; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0;'>
                            <p style='margin: 0; color: #a0aec0; font-size: 13px;'>
                                © 2026 MailLedger. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
